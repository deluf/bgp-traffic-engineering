frr version 10.4.1_git
frr defaults traditional
hostname GW2
log syslog informational
service integrated-vtysh-config

! =============================================================================
!                                  Interfaces
! =============================================================================
interface eth1
    ip address 10.0.6.0/31
exit
interface eth2
    ip address 172.16.0.4/24
exit
interface lo0
    ip address 192.168.3.4/32
exit

! =============================================================================
!                                      BGP
! =============================================================================
route-map LOCALPREF_MAP permit 10
    match ip address prefix-list LOCALPREF_PREFIX_LIST
    set local-preference 200
route-map LOCALPREF_MAP permit 999
router bgp 65020
    no bgp ebgp-requires-policy
    no bgp network import-check

    bgp router-id 192.168.3.4
    
    neighbor 10.0.6.1 remote-as 65005
    neighbor 10.0.6.1 route-map LOCALPREF_MAP in
    neighbor IBGP-PEERS peer-group
    neighbor IBGP-PEERS remote-as 65020
    neighbor IBGP-PEERS next-hop-self
    
    neighbor 172.16.0.1 peer-group IBGP-PEERS
    neighbor 172.16.0.2 peer-group IBGP-PEERS
    neighbor 172.16.0.3 peer-group IBGP-PEERS
exit